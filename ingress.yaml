apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doctor-ingress
  namespace: doctor
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: doctor-backend-svc
                port:
                  number: 4000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: doctor-frontend-svc
                port:
                  number: 80