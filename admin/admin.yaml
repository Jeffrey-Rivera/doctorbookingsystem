apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-admin
  namespace: doctor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-admin
  template:
    metadata:
      labels:
        app: doctor-admin
    spec:
      containers:
        - name: admin
          image: 730335227222.dkr.ecr.ca-central-1.amazonaws.com/doctor-admin:0.1.1
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: doctor-admin-svc
  namespace: doctor
spec:
  selector:
    app: doctor-admin
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP